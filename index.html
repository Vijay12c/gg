<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vijay | Founder & Developer</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    scroll-behavior:smooth;
}

body{
    background:#0f2027;
    color:white;
    overflow-x:hidden;
}

/* Animated Background */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* Navbar */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    position:fixed;
    width:100%;
    backdrop-filter: blur(12px);
    z-index:1000;
}

nav h1{
    color:#00f7ff;
}

/* Hero */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.hero h2{
    font-size:50px;
}

/* Typing cursor */
.cursor{
    display:inline-block;
    background:#00f7ff;
    width:3px;
    margin-left:5px;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%,50%,100%{opacity:1;}
    25%,75%{opacity:0;}
}

.hero p{
    margin-top:10px;
    opacity:0.8;
}

/* Button */
.btn{
    margin-top:20px;
    padding:12px 28px;
    border-radius:30px;
    background:#00f7ff;
    color:#000;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
}

/* Section */
.section{
    padding:100px 50px;
    text-align:center;
}

.cards{
    display:flex;
    gap:25px;
    justify-content:center;
    flex-wrap:wrap;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:25px;
    border-radius:18px;
    width:280px;
    backdrop-filter: blur(12px);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-12px);
}

.highlight{
    color:#00f7ff;
}

footer{
    text-align:center;
    padding:25px;
    opacity:0.7;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
    <h1>Vijay</h1>
</nav>

<section class="hero">
    <h2>
        <span id="typing"></span><span class="cursor"></span>
    </h2>
    <p>Founder | Co-Owner | Developer</p>
</section>

<script>
/* Typing Effect */
const text = "Hi, I'm Vijay";
let i = 0;

function type(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 80);
    }
}
type();

/* Animated Background (Particles) */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        size: Math.random()*2,
        speedX: Math.random()*1 -0.5,
        speedY: Math.random()*1 -0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.x += p.speedX;
        p.y += p.speedY;

        ctx.fillStyle = "#00f7ff";
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();

        if(p.x<0||p.x>canvas.width) p.speedX *= -1;
        if(p.y<0||p.y>canvas.height) p.speedY *= -1;
    });

    requestAnimationFrame(animate);
}
animate();

/* Resize fix */
window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
